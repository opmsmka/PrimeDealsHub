      <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="PrimeDealsHub - Expert en solutions numériques et cartes cadeaux à prix avantageux.">
    <title>PrimeDealsHub - Store</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #1a1a1a; color: white; padding: 20px; text-align: center; }
        .container { 
            max-width: 550px; margin: auto; 
            background-image: url('1000057898.jpg'); /* Assurez-vous que le nom du fichier est identique sur GitHub */
            background-size: cover; background-position: center;
            padding: 30px; border-radius: 15px; position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }
        .container::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.88); border-radius: 15px; z-index: 1;
        }
        h1, p, #catalogue, #paiement { position: relative; z-index: 2; }
        h1 { color: #f7931a; }
        .item-card { 
            background-color: rgba(61, 61, 61, 0.6); padding: 18px; margin-bottom: 12px; 
            border-radius: 10px; cursor: pointer; border: 1px solid #666;
            display: flex; justify-content: space-between; font-family: monospace;
        }
        .item-card:hover { border-color: #f7931a; background-color: rgba(247, 147, 26, 0.2); }
        .hidden-section { display: none; margin-top: 30px; border-top: 2px dashed #f7931a; padding-top: 20px; }
        input { 
            width: 85%; padding: 12px; margin-bottom: 10px; border-radius: 8px; 
            border: 1px solid #555; background: #222; color: white;
        }
        .action-btn { 
            padding: 12px 25px; background-color: #f7931a; color: white; 
            border: none; border-radius: 8px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>PrimeDealsHub</h1>
        <p>Select your product to proceed:</p>

        <div id="catalogue">
            <div class="item-card" onclick="selectCard('8492-XXXX-XXXX-XXXX', '35$')"><span>💳 8492-XXXX...</span> <b>35$</b></div>
            <div class="item-card" onclick="selectCard('3715-XXXX-XXXX-XXXX', '47$')"><span>💳 3715-XXXX...</span> <b>47$</b></div>
            <div class="item-card" onclick="selectCard('9204-XXXX-XXXX-XXXX', '52$')"><span>💳 9204-XXXX...</span> <b>52$</b></div>
            <div class="item-card" onclick="selectCard('1583-XXXX-XXXX-XXXX', '46$')"><span>💳 1583-XXXX...</span> <b>46$</b></div>
            <div class="item-card" onclick="selectCard('6479-XXXX-XXXX-XXXX', '39$')"><span>💳 6479-XXXX...</span> <b>39$</b></div>
            <div class="item-card" onclick="selectCard('2931-XXXX-XXXX-XXXX', '48$')"><span>💳 2931-XXXX...</span> <b>48$</b></div>
            <div class="item-card" onclick="selectCard('5108-XXXX-XXXX-XXXX', '62$')"><span>💳 5108-XXXX...</span> <b>62$</b></div>
        </div>

        <div id='paiement' class="hidden-section">
            <h2 id="payment-title">Checkout</h2>
            <input type="text" id="username" placeholder="Enter your pseudo">
            <input type="email" id="email" placeholder="Enter your email address">
            
            <p>Send <span id="price-display" style="color: #f7931a; font-weight: bold;"></span> to this address:</p>
            <div style="background:#000; padding:10px; font-family:monospace; color:#00ff00; margin:10px 0;">bc1qevxlcu7x3r6fq52dhwn2fpah4unu9n6a9c44wq</div>
            
            <button class="action-btn" onclick="finalize()">Confirm Payment</button>
            <br><br>
            <button onclick="location.reload()" style="background:none; border:none; color:#888; cursor:pointer;">Cancel</button>
        </div>
    </div>

    <script>
        function selectCard(num, price) {
            document.getElementById('catalogue').style.display = 'none';
            document.getElementById('paiement').style.display = 'block';
            document.getElementById('price-display').innerText = price;
            document.getElementById('payment-title').innerText = "Checkout: " + num;
        }

        function finalize() {
            var user = document.getElementById('username').value;
            var email = document.getElementById('email').value;
            
            if(user === "" || email === "") { 
                alert("Please fill in both your pseudo and email address!"); 
                return; 
            }
            alert("Thank you " + user + "! Your request is received. You will receive the card details at " + email + " once the payment is confirmed.");
        }
    </script>
</body>
</html>
